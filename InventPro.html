<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InventPro – Inventari Concorsuali</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f7;--surface:#fff;--border:#e5e5e2;--border2:#d0d0cc;
  --text:#1a1a16;--muted:#6b6b64;--muted2:#a0a09a;
  --brand:#1d4ed8;--brand-light:#eff4ff;--brand-dark:#1a44c0;
  --ok:#15803d;--ok-bg:#f0fdf4;--warn:#92400e;--warn-bg:#fffbeb;
  --danger:#b91c1c;--danger-bg:#fef2f2;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}

/* ── TOAST ─────────────────────────────────────────────── */
#toast{position:fixed;top:16px;right:16px;z-index:9999;max-width:340px;padding:11px 16px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.15);display:none;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
#toast.ok{background:#14532d;color:#bbf7d0}
#toast.err{background:#7f1d1d;color:#fecaca}
#toast.warn{background:#78350f;color:#fef3c7}
#toast.info{background:#1e3a5f;color:#bfdbfe}

/* ── CONFIRM MODAL ─────────────────────────────────────── */
#confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:9990;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
#confirm-modal.open{display:flex}
.confirm-box{background:var(--surface);border-radius:var(--radius-lg);padding:28px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
#confirm-msg{font-size:14px;line-height:1.6;color:var(--text);margin-bottom:20px;white-space:pre-wrap}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end}

/* ── APP LAYOUT ────────────────────────────────────────── */
.app{display:flex;height:100vh}
.sidebar{width:232px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── SIDEBAR ───────────────────────────────────────────── */
.sb-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:32px;height:32px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.sb-logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.sb-logo-sub{font-size:11px;color:var(--muted)}
.sb-nav{padding:8px;flex:1;overflow-y:auto}
.nav-sect{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);padding:12px 8px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--muted);transition:all .12s;white-space:nowrap}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.on{background:var(--brand-light);color:var(--brand);font-weight:500}
.ni-icon{width:16px;text-align:center;flex-shrink:0}
.sb-footer{padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--text);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:11px;color:var(--muted)}

/* ── TOPBAR ────────────────────────────────────────────── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;gap:0;flex-shrink:0}
.topbar-wordmark{display:none}@media(min-width:540px){.topbar-wordmark{display:block}}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--text);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:DM Mono,monospace;flex-shrink:0}
.tb-left{min-width:0}
.tb-title{font-size:15px;font-weight:600;letter-spacing:-.2px}
.tb-sub{font-size:12px;color:var(--muted)}
.tb-actions{display:flex;gap:6px;flex-shrink:0}

/* ── CONTENT ───────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;padding:20px}

/* ── BUTTONS ───────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 13px;height:33px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--bg)}
.btn:active{transform:scale(.98)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}.btn-primary:hover{background:var(--brand-dark)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:#fecaca}.btn-danger:hover{background:#fee2e2}
.btn-warn{background:var(--warn-bg);color:var(--warn);border-color:#fde68a}
.btn-ok{background:var(--ok-bg);color:var(--ok);border-color:#bbf7d0}

/* ── CARDS ─────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:14px}

/* ── STATS ─────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
.stat-lbl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px}

/* ── DASH TABS ─────────────────────────────────────────── */
.dash-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px}
.dash-tab{padding:10px 22px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:8px}
.dash-tab:hover{color:var(--text)}
.dash-tab.on{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.dash-tab .tbadge{font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;background:var(--border);color:var(--muted)}
.dash-tab.on .tbadge{background:var(--brand);color:#fff}
.dash-tab.warn-tab.on{color:var(--warn);border-bottom-color:#f59e0b}
.dash-tab.warn-tab.on .tbadge{background:#f59e0b;color:#fff}

/* ── TABLES ────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--bg);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

/* ── BADGES ────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.b-green{background:#dcfce7;color:#15803d}
.b-blue{background:#dbeafe;color:#1d4ed8}
.b-gray{background:#f1f1ef;color:var(--muted)}
.b-amber{background:#fef3c7;color:#92400e}

/* ── FORM ──────────────────────────────────────────────── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.fg.g1{grid-template-columns:1fr}
.fg.g3{grid-template-columns:1fr 1fr 1fr}
.full{grid-column:1/-1}
.inp-row{display:flex;flex-direction:column;gap:5px}
.inp-row label{font-size:12px;font-weight:500;color:var(--muted)}
.inp-row input,.inp-row select,.inp-row textarea{font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:border .12s;width:100%}
.inp-row input:focus,.inp-row select:focus,.inp-row textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.inp-row textarea{resize:vertical;min-height:72px;line-height:1.5}
::placeholder{color:var(--muted2);font-style:italic;opacity:1}

/* ── ART TABS ──────────────────────────────────────────── */
.art-tabs{display:flex;border-bottom:2px solid var(--border);background:var(--surface);overflow-x:auto}
.at{padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.at:hover{color:var(--text)}
.at.on{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
#art-tab-content{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:20px}

/* ── PHOTO GRID ────────────────────────────────────────── */
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.photo-slot{aspect-ratio:4/3;border:1.5px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:var(--bg);transition:all .15s}
.photo-slot:hover{border-color:var(--brand);background:var(--brand-light)}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-slot .del-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center}
.photo-slot:hover .del-btn{display:flex}
.add-icon{width:24px;height:24px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:4px;font-size:16px;color:var(--muted)}
.photo-slot:hover .add-icon{background:var(--brand-light);color:var(--brand)}
.add-txt{font-size:11px;color:var(--muted)}

/* ── AI BOX ────────────────────────────────────────────── */
.ai-box{background:var(--brand-light);border:1px solid #bdd3f5;border-radius:var(--radius-lg);padding:14px;margin-bottom:14px}
.ai-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ai-title{font-size:13px;font-weight:600;color:var(--brand)}
.btn-ai{background:linear-gradient(135deg,#1a5fa8,#7c3aed);color:#fff;border:none;font-size:13px;padding:9px 18px;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;width:100%;text-align:center;transition:all .2s;margin-top:8px}
.btn-ai:hover{background:linear-gradient(135deg,#155b9e,#6b2fd4);color:#fff!important}
.btn-ai:disabled{opacity:.4;cursor:not-allowed}
#ai-analysis-result{margin-top:8px;font-size:13px}

/* ── SEDI ──────────────────────────────────────────────── */
.sede-card{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--bg)}
.sede-highlight{background:var(--brand-light);border-color:#bdd3f5}
.sede-tipo{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;margin-top:2px}
.sede-legale{background:#dbeafe;color:#1d4ed8}
.sede-operativa{background:#dcfce7;color:#15803d}
.sede-info{flex:1;min-width:0}
.sede-nome{font-size:13px;font-weight:500}
.sede-addr{font-size:11px;color:var(--muted);margin-top:2px}
.sede-form{display:none;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:10px}

/* ── ART ROW ───────────────────────────────────────────── */
.art-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--surface)}
.art-row:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.art-thumb{width:52px;height:52px;border-radius:var(--radius);overflow:hidden;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px}
.art-thumb img{width:100%;height:100%;object-fit:cover}
.art-body{flex:1;min-width:0}
.art-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.art-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stag{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--warn-bg);color:var(--warn);border:1px solid #fde68a;font-family:'DM Mono',monospace}
.art-price{text-align:right;flex-shrink:0;min-width:90px}
.art-pv{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;color:#8b1a1a}
.art-ps{font-size:10px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}

/* ── TOTALS BAR ────────────────────────────────────────── */
.totbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:14px;display:flex;gap:0}
.tot-item{flex:1;padding:0 16px;border-right:1px solid var(--border)}
.tot-item:first-child{padding-left:0}
.tot-item:last-child{border-right:none}
.tot-lbl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.tot-val{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}

/* ── LOGIN ─────────────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:400px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
.login-tabs{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:3px;margin-bottom:20px}
.lt{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;color:var(--muted);transition:all .12s}
.lt.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.err-msg{background:var(--danger-bg);border:1px solid #fecaca;color:var(--danger);border-radius:var(--radius);padding:9px 12px;font-size:12px;margin-bottom:12px;display:none}

/* ── PROC MODAL ────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border-radius:var(--radius-lg);padding:26px;width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:17px;font-weight:600;letter-spacing:-.3px;margin-bottom:18px}

/* ── SUGGEST ───────────────────────────────────────────── */
.comune-suggest:hover{background:var(--bg)}

/* ── PROGRESS ──────────────────────────────────────────── */
.progress-bar{background:var(--border);border-radius:4px;height:5px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--brand);border-radius:4px;transition:width .15s}

/* ── SCROLLBAR ─────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── CLOSED PROC BANNER ────────────────────────────────── */
.closed-banner{background:var(--warn-bg);border:1px solid #fde68a;border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}

/* ── BOTTOM NAV ─────────────────────────────────────────────── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(60px + env(safe-area-inset-bottom,20px));background:var(--surface);border-top:1px solid var(--border);z-index:200;align-items:flex-start;justify-content:space-around;padding-top:8px;padding-bottom:env(safe-area-inset-bottom,20px)}
.mn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:DM Sans,sans-serif;font-size:11px;font-weight:500;flex:1;border-radius:10px;transition:color .15s}
.mn-item.on{color:var(--brand)}

/* ── MOBILE RESPONSIVE ──────────────────────────────────────── */
@media(max-width:640px){
  html,body{font-size:16px}
  .app{flex-direction:column;height:100vh;overflow:hidden}
  .sidebar{display:none!important}
  .content{padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0;padding-bottom:calc(74px + env(safe-area-inset-bottom,20px))}
  .mobile-nav{display:flex!important}
  .topbar{padding:0 12px;height:56px;flex-shrink:0}
  .tb-sub{font-size:12px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #user-name{display:none!important}
  button.n-sm{width:38px;height:38px;font-size:17px}
  .user-pill{width:36px!important;height:36px!important;padding:0!important;border-radius:50%!important;font-size:13px!important;font-weight:700!important}
  .stats{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .stat{padding:14px 12px;border-radius:12px}
  .stat-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .stat-val{font-size:26px;font-weight:700}
  .dash-tabs{gap:0;border-bottom:2px solid var(--border);margin-bottom:14px}
  .dash-tab{font-size:15px;padding:10px 16px;font-weight:500}
  .dash-tab.on{border-bottom:2px solid var(--brand);color:var(--brand);margin-bottom:-2px}
  .card{margin-bottom:12px;border-radius:12px}
  .card-title{font-size:15px;padding:12px 14px}
  .fg{grid-template-columns:1fr}
  .inp-row{grid-column:1/-1}
  input,select,textarea{font-size:16px!important;padding:11px 12px!important;border-radius:10px!important}
  .modal-box{width:100vw!important;margin:0!important;max-height:92vh;border-radius:20px 20px 0 0!important;position:fixed;bottom:0;left:0}
  .modal-overlay{align-items:flex-end!important;padding:0!important}
  .art-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:0;border-bottom:1px solid var(--border)}
  .at{padding:10px 16px;font-size:14px;white-space:nowrap;flex-shrink:0;font-weight:500}
  .photo-grid{grid-template-columns:repeat(2,1fr)}
  .photo-slot{height:140px;border-radius:10px}
  .art-row{padding:12px 10px;border-radius:10px;margin-bottom:8px}
  .art-thumb{width:52px;height:52px;border-radius:8px}
  .art-name{font-size:15px}
  .btn{font-size:15px;padding:0 16px;height:40px;border-radius:10px}
  .btn-sm{font-size:13px;padding:0 12px;height:34px;border-radius:8px}
  .export-bar{grid-template-columns:1fr!important}
  .totbar{flex-wrap:wrap;gap:8px}
  .tot-item{flex:1;min-width:44%}
  table{font-size:13px}
  table th,table td{padding:8px 8px}
}
@media(max-width:400px){
  .content{padding:10px;padding-bottom:calc(74px + env(safe-area-inset-bottom,20px))}
  .stat-val{font-size:22px}
  .tb-sub{display:none}
}

</style>
</head>
<body>

<div id="toast"></div>
<div id="print-overlay" style="display:none"></div>

<div id="confirm-modal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="confirm-box">
    <div id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="btn" id="confirm-no">Annulla</button>
      <button class="btn btn-danger" id="confirm-yes">Conferma</button>
    </div>
  </div>
</div>

<!-- ── LOGIN SCREEN ─────────────────────────────────────── -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:26px">
      <div style="font-size:26px;font-weight:700;letter-spacing:-.5px">InventPro</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Gestione Inventari</div>

<script>
// ── CONSTANTS ───────────────────────────────────────────────────────────────
const UK='ip_users', PK='ip_procs', AK='ip_arts', CK='ip_cur', SK='ip_settings';
const DATA_VER='v5';
const SIECIC_TIPOLOGIE=['BENE MOBILE','BENE MOBILE REGISTRATO','BENE IMMOBILE','CREDITO','PARTECIPAZIONE','BENE IMMATERIALE','AZIENDA/RAMO D\'AZIENDA','ALTRO'];

const SIECIC_SOTTOCATEGORIE={
  'BENE MOBILE':['Arredi ufficio','Arredi negozio','Macchinari industriali','Attrezzature','Informatica e elettronica','Utensili e attrezzi','Merci e scorte','Materie prime','Prodotti finiti','Altro'],
  'BENE MOBILE REGISTRATO':['Autovettura','Autocarro','Motoveicolo','Natante','Aeromobile','Macchina operatrice','Altro'],
  'BENE IMMOBILE':['Capannone','Ufficio','Negozio','Abitazione','Terreno','Altro'],
  'CREDITO':['Credito commerciale','Credito finanziario','Deposito bancario','Altro'],
  'PARTECIPAZIONE':['Quota s.r.l.','Azioni s.p.a.','Altra partecipazione'],
  'BENE IMMATERIALE':['Brevetto','Marchio','Software','Licenza','Avviamento','Altro'],
  'AZIENDA/RAMO D\'AZIENDA':['Azienda','Ramo d\'azienda'],
  'ALTRO':['Altro']
};
const FALLCO_TITOLI=['Proprietà','Leasing','Comodato','Usufrutto','Nuda proprietà','Locazione finanziaria','Bene terzo','Oggetto rivendica'];
const SIECIC_MISURE=['NR','KG','Q','T','MT','MQ','MC','L','SET','LOTTO'];

let currentUser=null, currentProc=null, editingArt=null;
let artTab=1, artPhotos=[], aiScanImageB64=null, tempSedi=[];
let _dashTab='attive', _editSedeIdx=-1;
let _navHistory=[];

// ── STORAGE ──────────────────────────────────────────────────────────────────
function ls(k){try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}}
function lss(k,v){localStorage.setItem(k,JSON.stringify(v))}
function g(id){return document.getElementById(id)}
function vv(id){var e=g(id);return e?e.value.trim():''}
function fmtEur(n){return '€'+parseFloat(n||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2})}
function getSettings(){return ls(SK)||{ragSoc:'InventPro Srl',indirizzo:'',comune:'',cap:'',provincia:'',piva:'',logo:''}}

// ── SEED ─────────────────────────────────────────────────────────────────────
(function(){
  if(ls('ip_dver')!==DATA_VER){
    lss(CK,null);
    var users=ls(UK)||[];
    users=users.filter(function(u){return u.email&&u.pass;});
    if(!users.find(function(u){return u.email==='admin@inventpro.it';})){
      users.unshift({id:'u0',nome:'Admin',cognome:'InventPro',email:'admin@inventpro.it',pass:'admin123',ruolo:'Amministratore',tribunale:'Tutti',tel:'',isAdmin:true,registeredAt:new Date().toISOString()});
    }else{
      users=users.map(function(u){return u.email==='admin@inventpro.it'?Object.assign({},u,{isAdmin:true}):u;});
    }
    lss(UK,users);
    lss('ip_dver',DATA_VER);
  }
  var users=ls(UK)||[];
  if(!users.find(function(u){return u.email==='admin@inventpro.it';})){
    users.unshift({id:'u0',nome:'Admin',cognome:'InventPro',email:'admin@inventpro.it',pass:'admin123',ruolo:'Amministratore',tribunale:'Tutti',tel:'',isAdmin:true,registeredAt:new Date().toISOString()});
    lss(UK,users);
  }
  if(!ls(PK))lss(PK,[{id:'p1',nome:'DNR Sicurezza Srl',tipo:'Liquidazione giudiziale',num:'2/2025',tribunale:'Lecco',giudice:'ES: Dott. Rossi',curatore:'ES: Avv. Verdi',commissionario:'',data:'2025-01-01',status:'attiva',owner:'u0',sedi:[{id:'s1',nome:'Sede legale',tipo:'legale',nazione:'IT',indirizzo:'Via Roma 1',comune:'Lecco',cap:'23900',provincia:'LC',hasBeni:true,isDefault:true}]}]);
  if(!ls(AK))lss(AK,[]);
})();

// ── NOTIFY ───────────────────────────────────────────────────────────────────
function notify(msg,type,dur){
  var t=g('toast');if(!t)return;
  t.textContent=msg;t.className=type||'info';t.style.display='block';
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.style.display='none';},dur||3500);
}

// ── CONFIRM MODAL ─────────────────────────────────────────────────────────────
function customConfirm(msg,onYes){
  var modal=g('confirm-modal'),msgEl=g('confirm-msg'),yesBtn=g('confirm-yes'),noBtn=g('confirm-no');
  msgEl.textContent=msg;
  modal.classList.add('open');
  var clean=function(){modal.classList.remove('open');yesBtn.onclick=null;noBtn.onclick=null;};
  yesBtn.onclick=function(){clean();onYes();};
  noBtn.onclick=clean;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function switchLoginTab(t){
  g('lf').style.display=t==='login'?'block':'none';
  g('rf').style.display=t==='reg'?'block':'none';
  document.querySelectorAll('.lt').forEach(function(el,i){el.classList.toggle('on',(t==='login'&&i===0)||(t==='reg'&&i===1));});
}
function showErr(msg){g('err-msg').textContent=msg;g('err-msg').style.display='block';}
function hideErr(){g('err-msg').style.display='none';}
function resetApp(){
  customConfirm('Questo cancellerà tutti i dati locali e ricaricherà la pagina.\nContinuare?',function(){
    ['ip_users','ip_procs','ip_arts','ip_cur','ip_settings','ip_dver'].forEach(function(k){localStorage.removeItem(k);});
    location.reload();
  });
}
function doLogin(){
  hideErr();
  var email=vv('l-email'), pass=g('l-pass').value;
  var u=(ls(UK)||[]).find(function(x){return x.email===email&&x.pass===pass;});
  if(!u)return showErr('Email o password non corretti');
  lss(CK,u.id);startApp(u);
}
function doRegister(){
  hideErr();
  var nome=vv('r-nome'),cog=vv('r-cog'),email=vv('r-email'),trib=vv('r-trib'),pass=g('r-pass').value;
  var tel=vv('r-tel'),ruolo=vv('r-ruolo'),ind=vv('r-ind'),citta=vv('r-citta');
  if(!nome)return showErr('Il campo Nome è obbligatorio');
  if(!cog)return showErr('Il campo Cognome è obbligatorio');
  if(!email)return showErr('Il campo Email è obbligatorio');
  if(!trib)return showErr('Il campo Tribunale è obbligatorio');
  if(!pass)return showErr('Inserisci una password');
  var users=ls(UK)||[];
  if(users.find(function(u){return u.email===email;}))return showErr('Email già registrata');
  var nu={id:'u'+Date.now(),nome:nome,cognome:cog,email:email,pass:pass,ruolo:ruolo,tribunale:trib,tel:tel,indirizzo:ind,citta:citta,isAdmin:false,registeredAt:new Date().toISOString()};
  users.push(nu);lss(UK,users);lss(CK,nu.id);startApp(nu);
}
function doBiometric(){
  if(!window.PublicKeyCredential||!window.isSecureContext){notify('Face ID disponibile solo su HTTPS','warn');return;}
  var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
  navigator.credentials.get({publicKey:{challenge:challenge,timeout:60000,userVerification:'preferred',rpId:window.location.hostname||'localhost'}})
    .then(function(cred){
      var credId=btoa(String.fromCharCode.apply(null,new Uint8Array(cred.rawId)));
      var users=ls(UK)||[];
      var u=users.find(function(x){return x.credentialId===credId;});
      if(u){lss(CK,u.id);startApp(u);}
      else{
        var email=prompt('Prima configurazione biometria.\nInserisci la tua email:');
        if(!email)return;
        var found=users.find(function(x){return x.email===email;});
        if(!found)return showErr('Email non trovata.');
        found.credentialId=credId;lss(UK,users);lss(CK,found.id);startApp(found);
      }
    })
    .catch(function(e){
      if(e.name==='NotAllowedError')notify('Accesso annullato','warn');
      else notify('Errore biometria: '+e.message,'err');
    });
}
function startApp(u){
  currentUser=u;
  g('login-screen').style.display='none';
  g('app-screen').style.display='flex';
  g('user-av').textContent=((u.nome[0]||'')+(u.cognome||'')[0]||'?').toUpperCase();
  g('user-name').textContent=u.nome||'User';

  var _ts=document.getElementById('topbar-settings');if(_ts)_ts.style.display='flex';
  if(u.isAdmin){var _na=document.getElementById('ni-admin');if(_na)_na.style.display='flex';}
  var procs=ls(PK)||[];
  if(procs.length)currentProc=procs[0];
  _navHistory=[];
  go('dash');
}
function logout(){lss(CK,null);currentUser=null;location.reload();}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash(){
  setTB('','','<button class="btn btn-primary btn-sm" onclick="openProcModal()">+ Procedura</button>');
  var allProcs=ls(PK)||[];
  var procs=currentUser.isAdmin?allProcs:allProcs.filter(function(p){return !p.owner||p.owner===currentUser.id;});
  var attive=procs.filter(function(p){return p.status==='attiva';});
  var nonAttive=procs.filter(function(p){return p.status!=='attiva';});
  var arts=ls(AK)||[];
  var tab=_dashTab||'attive';

  function procRow(p,showApri){
    var cnt=arts.filter(function(a){return a.procId===p.id;}).length;
    var badge=p.status==='attiva'?'b-green':'b-gray';
    var btn=showApri
      ?'<button class="btn btn-sm" onclick="selectProc(&quot;'+p.id+'&quot;)">Apri &#x2192;</button>'
      :'<button class="btn btn-sm btn-ok" onclick="toggleProcStatus(&quot;'+p.id+'&quot;)">&#x25B6; Riattiva</button>';
    return '<tr>'
      +'<td><strong>'+p.nome+'</strong><br><span style="font-size:11px;color:var(--muted)">'+(p.num||'')+'</span></td>'
      +'<td><span class="badge b-blue">'+p.tipo+'</span></td>'
      +'<td>'+(p.tribunale||'-')+'</td>'
      +'<td style="font-size:12px">'+(p.giudice||'-')+'<br>'+(p.curatore||'-')+'</td>'
      +'<td style="font-family:\'DM Mono\',monospace;font-size:13px">'+cnt+'</td>'
      +'<td><span class="badge '+badge+'">'+p.status+'</span></td>'
      +'<td>'+btn+'</td>'
      +'</tr>';
  }
  function procCard(p,showApri){
    var tipo=p.tipo||'';var tipoShort=tipo.length>20?tipo.substring(0,20)+'…':tipo;
    var btn=showApri
      ?'<button class="btn btn-sm" onclick="selectProc(&quot;'+p.id+'&quot;)" style="white-space:nowrap">Apri →</button>'
      :'<button class="btn btn-sm btn-ok" onclick="toggleProcStatus(&quot;'+p.id+'&quot;)">▶ Riattiva</button>';
    var bgs=p.status==='attiva'?'background:#dcfce7;color:#15803d':'background:#f3f4f6;color:#6b7280';
    var badge='<span style="'+bgs+';font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px">'+p.status+'</span>';
    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">'
        +'<div><div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px">'+p.nome+'</div>'
        +'<div style="font-size:13px;color:var(--muted)">'+(p.num||'')+(p.tribunale?' · Tribunale di '+p.tribunale:'')+'</div></div>'
        +badge+'</div>'
      +'<div style="display:flex;align-items:center;justify-content:space-between">'
        +'<span style="background:#eff4ff;color:#1d4ed8;font-size:13px;padding:4px 10px;border-radius:20px">'+tipoShort+'</span>'
        +btn+'</div></div>';
  }
  function tableHtml(list,showApri){
    if(!list.length)return '<div style="text-align:center;padding:40px;color:var(--muted);">'+(showApri?'Nessuna procedura attiva. <button class="btn btn-sm btn-primary" style="margin-left:8px;margin-top:8px" onclick="openProcModal()">+ Crea la prima</button>':'Nessuna procedura non attiva.')+'</div>';
    if(window.innerWidth<=640)return '<div>'+list.map(function(p){return procCard(p,showApri);}).join('')+'</div>';
    return '<div style="overflow-x:auto"><table><thead><tr><th>Denominazione</th><th>Tipo</th><th>Tribunale</th><th>Giudice/Curatore</th><th>Art.</th><th>Stato</th><th></th></tr></thead><tbody>'+list.map(function(p){return procRow(p,showApri);}).join('')+'</tbody></table></div>';
  }

  var el=g('content');
  el.innerHTML=
    '<div class="stats">'
      +'<div class="stat"><div class="stat-lbl">Procedure attive</div><div class="stat-val">'+attive.length+'</div></div>'
      +'<div class="stat"><div class="stat-lbl">Procedure non attive</div><div class="stat-val" style="color:var(--muted)">'+nonAttive.length+'</div></div>'
    +'</div>'
    +'<div class="dash-tabs">'
      +'<div class="dash-tab'+(tab==='attive'?' on':'')+'" id="dtab-attive" onclick="switchDashTab(\'attive\')">'
        +'&#x2705; Procedure attive <span class="tbadge">'+attive.length+'</span></div>'
      +'<div class="dash-tab warn-tab'+(tab==='chiuse'?' on':'')+'" id="dtab-chiuse" onclick="switchDashTab(\'chiuse\')">'
        +'&#x1F4CC; Non attive <span class="tbadge">'+nonAttive.length+'</span></div>'
    +'</div>'
    +'<div id="dash-tab-content">'+(tab==='attive'?tableHtml(attive,true):tableHtml(nonAttive,false))+'</div>';
}

function switchDashTab(tab){
  _dashTab=tab;
  ['attive','chiuse'].forEach(function(t){
    var el=g('dtab-'+t);if(el)el.classList.toggle('on',t===tab);
  });
  var allProcs=ls(PK)||[];
  var procs=currentUser.isAdmin?allProcs:allProcs.filter(function(p){return !p.owner||p.owner===currentUser.id;});
  var list=tab==='attive'?procs.filter(function(p){return p.status==='attiva';}):procs.filter(function(p){return p.status!=='attiva';});
  var arts=ls(AK)||[];
  var showApri=tab==='attive';
  function procRow(p){
    var cnt=arts.filter(function(a){return a.procId===p.id;}).length;
    var badge=p.status==='attiva'?'b-green':'b-gray';
    var btn=showApri
      ?'<button class="btn btn-sm" onclick="selectProc(&quot;'+p.id+'&quot;)">Apri &#x2192;</button>'
      :'<button class="btn btn-sm btn-ok" onclick="toggleProcStatus(&quot;'+p.id+'&quot;)">&#x25B6; Riattiva</button>';
    return '<tr>'
      +'<td><strong>'+p.nome+'</strong><br><span style="font-size:11px;color:var(--muted)">'+(p.num||'')+'</span></td>'
      +'<td><span class="badge b-blue">'+p.tipo+'</span></td>'
      +'<td>'+(p.tribunale||'-')+'</td>'
      +'<td style="font-size:12px">'+(p.giudice||'-')+'<br>'+(p.curatore||'-')+'</td>'
      +'<td style="font-family:\'DM Mono\',monospace;font-size:13px">'+cnt+'</td>'
      +'<td><span class="badge '+badge+'">'+p.status+'</span></td>'
      +'<td>'+btn+'</td>'
      +'</tr>';
  }
  var tc=g('dash-tab-content');if(!tc)return;
  if(!list.length){tc.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">'+(showApri?'Nessuna procedura attiva.':'Nessuna procedura non attiva.')+'</div>';return;}
  tc.innerHTML='<div style="overflow-x:auto"><table><thead><tr><th>Denominazione</th><th>Tipo</th><th>Tribunale</th><th>Giudice/Curatore</th><th>Art.</th><th>Stato</th><th></th></tr></thead><tbody>'+list.map(procRow).join('')+'</tbody></table></div>';
}

function selectProc(id){
  currentProc=(ls(PK)||[]).find(function(p){return p.id===id;});
  if(currentProc)renderProcDetail();
}

function toggleProcStatus(pid){
  var procs=ls(PK)||[];
  var i=procs.findIndex(function(x){return x.id===pid;});
  if(i<0)return;
  var p=procs[i], isAttiva=p.status==='attiva';
  customConfirm((isAttiva?'Disattivare "':'Riattivare "')+p.nome+'"?'+(isAttiva?'\nLa procedura sarà spostata nelle Non attive.':''),function(){
    procs[i].status=isAttiva?'chiusa':'attiva';
    lss(PK,procs);
    if(currentProc&&currentProc.id===pid)currentProc=procs[i];
    notify(isAttiva?'Procedura disattivata':'Procedura riattivata','ok',2500);
    if(currentProc&&currentProc.id===pid)renderProcDetail();
    else renderDash();
  });
}

// ── PROC CRUD ─────────────────────────────────────────────────────────────────
function deleteProc(id){
  var p=(ls(PK)||[]).find(function(x){return x.id===id;});if(!p)return;
  var arts=(ls(AK)||[]).filter(function(a){return a.procId===id;});
  customConfirm('Eliminare "'+p.nome+'"?'+(arts.length?'\n\nAttenzione: verranno eliminati anche '+arts.length+' articoli.':'')+'\n\nOperazione IRREVERSIBILE.',function(){
    lss(PK,(ls(PK)||[]).filter(function(x){return x.id!==id;}));
    lss(AK,(ls(AK)||[]).filter(function(a){return a.procId!==id;}));
    if(currentProc&&currentProc.id===id)currentProc=null;
    notify('Procedura eliminata','ok',2500);
    go('dash');
  });
}

function openProcModal(existingProc){
  tempSedi=existingProc?(existingProc.sedi||[]).map(function(s){return Object.assign({},s);}):[];
  _editSedeIdx=-1;
  g('proc-modal-title').textContent=existingProc?'Modifica procedura':'Nuova procedura';
  g('proc-save-btn').textContent=existingProc?'Aggiorna':'Salva procedura';
  g('proc-save-btn').dataset.editId=existingProc?existingProc.id:'';
  g('pm-nome').value=existingProc?existingProc.nome:'';
  g('pm-tipo').value=existingProc?existingProc.tipo:'Liquidazione giudiziale';
  g('pm-num').value=existingProc?existingProc.num:'';
  g('pm-trib').value=existingProc?existingProc.tribunale:'';
  g('pm-giudice').value=existingProc?existingProc.giudice:'';
  g('pm-curatore').value=existingProc?existingProc.curatore:'';
  g('pm-comm').value=existingProc?existingProc.commissionario:'';
  g('pm-data').value=existingProc?existingProc.data:'';
  g('sede-form').style.display='none';
  renderSediModal();
  g('proc-modal').classList.add('open');
}
function closeModal(){g('proc-modal').classList.remove('open');}
function editProc(){if(currentProc)openProcModal(currentProc);}

function saveSedeModal(){
  var nome=vv('sf-nome');if(!nome)return notify('Inserisci il nome della sede','warn');

function autoCalcGiud(){
  var vmEl=g('a-vmkt'),vgEl=g('a-vgiu'),qtaEl=g('a-qta');
  if(!vmEl||!vgEl)return;
  var vm=parseFloat(vmEl.value||0),qta=parseFloat(qtaEl?qtaEl.value||1:1);
  if(vm>0){vgEl.value=Math.round(vm*0.25);}
  var vtD=g('vt-display'),vgD=g('vg-display');
  if(vtD)vtD.textContent=fmtEur(vm*qta);
  if(vgD)vgD.textContent=fmtEur(Math.round(vm*0.25)*qta);
}

function saveArticolo(){
  var _dr=window._aiDraft||{};var _ea=editingArt||{};
  function rv(id,key){var v=vv(id);return v||(key?(_dr[key]||_ea[key]||''):'');}
  var d={
    tipologiaSiecic:rv('a-tipo','tipologiaSiecic'),sottocategoria:rv('a-sottocat','sottocategoria'),
    descBreve:rv('a-desc-breve','descBreve'),descEstesa:rv('a-desc-estesa','descEstesa'),
    marca:rv('a-marca','marca'),modello:rv('a-modello','modello'),anno:rv('a-anno','anno'),km:rv('a-km','km'),
    titolo:rv('a-titolo','titolo'),quota:parseFloat(vv('a-quota'))||_ea.quota||100,
    misura:rv('a-misura','misura'),qta:parseFloat(vv('a-qta'))||_ea.qta||1,stato:rv('a-stato','stato'),
    serial:rv('a-serial','serial'),sedeId:rv('a-sede','sedeId'),
    valMercato:rv('a-vmkt','valMercato'),valGiud:rv('a-vgiu','valGiud'),
    dataperizia:rv('a-dperizia','dataperizia'),codLotto:rv('a-lotto','codLotto'),note:rv('a-note','note'),
    qrCode:rv('qr-hidden','qrCode')
  };
  if(!d.descBreve)return notify('Inserisci almeno una descrizione breve','warn');
  if((!d.valGiud||parseFloat(d.valGiud)===0)&&d.valMercato)d.valGiud=Math.round(parseFloat(d.valMercato)*0.25);
  var arts=ls(AK)||[];
  if(editingArt){
    var idx=arts.findIndex(function(a){return a.id===editingArt.id;});
    if(idx>=0)arts[idx]=Object.assign({},arts[idx],d,{photos:artPhotos});
  }else{
    var n=String(arts.filter(function(a){return a.procId===currentProc.id;}).length+1).padStart(3,'0');
    var procSigla=(currentProc.nome||'').replace(/\s/g,'').substring(0,3).toUpperCase();
    var tribSigla=(currentProc.tribunale||'XX').substring(0,2).toUpperCase();
    arts.push(Object.assign({id:'a'+Date.now(),procId:currentProc.id,owner:currentUser.id,createdAt:new Date().toISOString()},d,{photos:artPhotos,qrCode:d.qrCode||(procSigla+'-'+tribSigla+'-'+n)}));
  }
  lss(AK,arts);editingArt=null;artPhotos=[];aiScanImageB64=null;window._aiDraft=null;
  notify('Articolo salvato','ok',2500);renderProcDetail();
}

function editArt(id){

}

function deleteArt(id){

// ── QR CODE ───────────────────────────────────────────────────────────────────
function openManualQRDialog(){
  var current=(g('qr-hidden')&&g('qr-hidden').value)||'';
  var show=g('qr-val-show');if(!show)return;
  show.innerHTML='';
  var inp=document.createElement('input');
  inp.type='text';inp.value=current;inp.placeholder='ES: DNR-LC-001';
  inp.style.cssText='font-family:\'DM Mono\',monospace;font-size:14px;border:1.5px solid var(--brand);border-radius:6px;padding:5px 10px;width:180px;outline:none;margin-right:6px';
  inp.onkeydown=function(e){if(e.key==='Enter')applyManualQR();};
  var btn=document.createElement('button');btn.className='btn btn-sm btn-primary';btn.textContent='✓ Applica';btn.onclick=applyManualQR;
  show.appendChild(inp);show.appendChild(btn);
  setTimeout(function(){inp.focus();inp.select();},50);
}
function applyManualQR(){
  var inp=document.querySelector('#qr-val-show input');if(!inp)return;
  var v=inp.value.trim();if(!v)return;
  g('qr-hidden').value=v;
  var show=g('qr-val-show');if(show){show.innerHTML='';var sp=document.createElement('span');sp.style.cssText='font-size:15px;font-weight:600;font-family:\'DM Mono\',monospace;color:var(--brand)';sp.textContent=v;show.appendChild(sp);}
  var b=g('qrcanvas');if(b){b.innerHTML='';try{new QRCode(b,{text:v,width:100,height:100,colorDark:'#1a1a16',colorLight:'#fff'});}catch(e){}}
}
function printQR(){
  var qr=g('qr-hidden')&&g('qr-hidden').value;if(!qr)return;
  var w=window.open('','_blank');if(!w)return;
  var sc='scr'+'ipt';
  var s1='<'+sc+' src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></'+sc+'>';
  var s2='<'+sc+'>new QRCode(document.getElementById("qrp"),{text:"'+qr+'",width:200,height:200})</'+sc+'>';
  w.document.write('<html><head><meta charset="UTF-8"></head><body style="text-align:center;padding:40px;font-family:sans-serif"><h3>InventPro – QR</h3><div id="qrp"></div><p style="margin-top:14px;font-family:monospace">'+qr+'</p>'+s1+s2+'</body></html>');
  setTimeout(function(){w.print();},800);
}
function startQRScan(){
  var isMobile=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if(isMobile){
    var area=g('qr-scan-area');if(!area)return;
    area.style.display='block';
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
      .then(function(stream){var video=g('qr-video');if(video){video.srcObject=stream;video.play();}})
      .catch(function(){var a=g('qr-scan-area');if(a)a.style.display='none';notify('Fotocamera non disponibile','warn');});
  }else{

  if(!_apiKey||_apiKey.length<20){resultBox.innerHTML='<div style="color:var(--danger);font-size:12px">API Key mancante. Vai in Impostazioni.</div>';return;}
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',

      ]}]
    })
  }).then(function(r){return r.json();})
  .then(function(data){
    var text='';
    if(data.content){for(var _i=0;_i<data.content.length;_i++){if(data.content[_i]&&data.content[_i].type==='text'&&data.content[_i].text){text=data.content[_i].text;break;}}}
    if(!text&&data.error){resultBox.innerHTML='<div style="color:var(--danger);font-size:12px">Errore API: '+JSON.stringify(data.error)+'</div>';return;}
    if(!text){resultBox.innerHTML='<div style="color:var(--danger);font-size:12px">Risposta vuota. Verifica la API Key.</div>';return;}
    var clean=text.replace(/```json|```/g,'').trim();
    var j1=clean.indexOf('{'),j2=clean.lastIndexOf('}');
    if(j1>=0&&j2>j1)clean=clean.substring(j1,j2+1);
    var parsed;try{parsed=JSON.parse(clean);}catch(e){resultBox.innerHTML='<div style="color:var(--danger);font-size:12px">Risposta AI non valida.<br><small style="font-family:monospace;font-size:10px">'+clean.substring(0,150)+'</small></div>';return;}
    var _vm=parsed.valMercato||0;if(typeof _vm==='string')_vm=parseFloat(_vm.replace(/[^0-9.,]/g,'').replace(',','.'));_vm=Math.round(_vm)||0;
    window._aiResult={parsed:parsed,vm:_vm,vg:Math.round(_vm*0.25)};
    if(artTab!==2)setArtTab(2);

      if(window._aiResult.vm>0){window._aiDraft.valMercato=window._aiResult.vm;window._aiDraft.valGiud=window._aiResult.vg;}
      if(artTab!==2)setArtTab(2);else renderArtTab();

      notify('Analisi AI completata! Vai al tab Valori per la stima.','ok',4000);
    },100);
  }).catch(function(e){resultBox.innerHTML='<div style="color:var(--danger);font-size:12px">'+e.message+'</div>';});

function makeQRPng(text,size,cb){
  var tmp=document.createElement('div');tmp.style.cssText='position:fixed;left:-9999px;top:0';
  document.body.appendChild(tmp);
  try{
    new QRCode(tmp,{text:text||'?',width:size||80,height:size||80,colorDark:'#000000',colorLight:'#ffffff'});
    var att=0,tryGet=function(){
      var can=tmp.querySelector('canvas'),img=tmp.querySelector('img'),src='';
      if(can&&can.width>0)src=can.toDataURL('image/png');
      else if(img&&img.src&&img.src.length>100)src=img.src;
      if(src||att>20){document.body.removeChild(tmp);cb(src);}
      else{att++;setTimeout(tryGet,60);}

var _cTimer=null;
function lookupComune(val,capId,provId,listId){
  var list=g(listId);if(!list)return;
  if(val.length<2){list.style.display='none';return;}
  clearTimeout(_cTimer);
  _cTimer=setTimeout(function(){
    var q=val.toLowerCase();
    var matches=[];
    for(var cap in CAP_IT){var v=CAP_IT[cap].split('|');if(v[0].toLowerCase().startsWith(q))matches.push({cap:cap,nome:v[0],prov:v[1]});}
    if(matches.length){
      list.innerHTML=matches.slice(0,8).map(function(m){return'<div style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bg)" onmousedown="selectComune(\''+m.nome+'\',\''+m.cap+'\',\''+m.prov+'\',\''+capId+'\',\''+provId+'\',\''+listId+'\')">'+m.nome+'<span style="margin-left:6px;font-size:11px;color:var(--muted)">'+m.prov+'</span></div>';}).join('');
      list.style.display='block';
    }else{
      // Fallback: Photon
      fetch('https://photon.komoot.io/api/?q='+encodeURIComponent(val)+'&limit=6&lang=it&bbox=6.6,35.4,18.8,47.2&layer=city&layer=locality')
        .then(function(r){return r.json();})
        .then(function(data){
          var cities=(data.features||[]).filter(function(f){var p=f.properties||{};return p.country_code==='it'&&(p.osm_key==='place'||p.type==='city'||p.type==='town'||p.type==='village'||p.type==='locality');});
          if(!cities.length){list.style.display='none';return;}
          list.innerHTML=cities.slice(0,6).map(function(f){var p=f.properties||{};var nome=p.name||p.city||p.town||p.village||'';var prov=p.state||'';return'<div style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bg)" onmousedown="selectComune(\''+nome+'\',\'\',\''+prov+'\',\''+capId+'\',\''+provId+'\',\''+listId+'\')">'+nome+'<span style="margin-left:6px;font-size:11px;color:var(--muted)">'+prov+'</span></div>';}).join('');
          list.style.display='block';
        }).catch(function(){list.style.display='none';});
    }
  },200);
}
